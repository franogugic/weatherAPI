services:
  weatherapi-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: weatherapi-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  weatherapi-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weatherapi-api
    depends_on:
      - weatherapi-db
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__WeatherDb: "Server=weatherapi-db,1433;Database=WeatherDB;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
    ports:
      - "5001:8080"

volumes:
  sqlserver-data:
